<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Nathan Gomes</title>
<meta name="description" content="Chargé de Communication & Marketing Digital — Orléans">
<link rel="stylesheet" href="/Portfolio/style.css">
</head>
<body data-page="index">

<div id="nav-placeholder"></div>

<!-- ── HERO ── -->
<section class="hero" id="hero">
  <div class="hero-grid-bg"></div>
  <div class="hero-glow"></div>
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-badge">
        <span class="dot"></span>
        <span id="hero-badge-text"></span>
      </div>
      <h1 class="hero-name">
        <span id="hero-prenom"></span><br>
        <span class="line2" id="hero-nom"></span>
      </h1>
      <div class="hero-titre" id="hero-titre"></div>
      <p class="hero-accroche" id="hero-accroche"></p>
      <div class="hero-actions">
        <a href="#experiences" class="btn-primary">Voir mon parcours</a>
        <a href="#projets" class="btn-ghost">Mes projets GitHub</a>
      </div>
    </div>
    <div class="hero-photo-wrap" id="hero-photo-wrap">
      <!-- Photo injectée par app.js -->
    </div>
  </div>
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num">5<span>+</span></div>
      <div class="stat-label">Ans d'expérience</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">Expériences professionnelles</div>
    </div>
    <div class="stat">
      <div class="stat-num">200<span>+</span></div>
      <div class="stat-label">Pages web produites</div>
    </div>
    <div class="stat">
      <div class="stat-num">C1</div>
      <div class="stat-label">Anglais certifié EF SET</div>
    </div>
  </div>
</section>

<!-- ── EXPÉRIENCES ── -->
<section class="section exp-section" id="experiences">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-eyebrow">Parcours professionnel</div>
      <h2 class="section-title">Expé<span>riences</span></h2>
    </div>
    <div class="exp-grid" id="exp-grid"></div>
  </div>
</section>

<!-- ── PROJETS ── -->
<section class="section projets-section" id="projets">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-eyebrow">Vibe Coding · GitHub</div>
      <h2 class="section-title">Mes <span>projets</span></h2>
    </div>
    <div class="projets-grid" id="projets-grid"></div>
  </div>
</section>

<!-- ── COMPÉTENCES ── -->
<section class="section skills-section" id="competences">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-eyebrow">Savoir-faire</div>
      <h2 class="section-title">Compé<span>tences</span></h2>
    </div>
    <div class="skills-grid" id="skills-grid"></div>
  </div>
</section>

<!-- ── FORMATION ── -->
<section class="section formation-section" id="formation">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-eyebrow">Diplômes</div>
      <h2 class="section-title">Forma<span>tion</span></h2>
    </div>
    <div class="formation-grid" id="formation-grid"></div>
  </div>
</section>

<!-- ── CONTACT ── -->
<section class="section contact-section" id="contact">
  <div class="section-inner">
    <div class="section-header reveal">
      <div class="section-eyebrow">Me joindre</div>
      <h2 class="section-title">Travaillons <span>ensemble</span></h2>
    </div>
    <div class="contact-grid">
      <div class="reveal">
        <p class="contact-desc" id="contact-desc"></p>
      </div>
      <div class="contact-links" id="contact-links"></div>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="/Portfolio/app.js"></script>
</body>
</html>
